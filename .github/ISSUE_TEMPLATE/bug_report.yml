name: Bug Report
description: Report a bug or issue with one of our apps
title: "[Bug]: "
labels: ["bug"]
body:
  - type: dropdown
    id: app
    attributes:
      label: App
      description: Which app is this issue for?
      options:
        - Zilch
        - Sidewall
        - Crown Climb
        - Shiplet
        - TrueUp
        - Crucigram
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug
      placeholder: What happened?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior
      placeholder: |
        1. Go to '...'
        2. Tap on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: false

  - type: input
    id: version
    attributes:
      label: App Version
      description: What version of the app are you using?
      placeholder: "e.g., 1.2.3"
    validations:
      required: false

  - type: input
    id: os
    attributes:
      label: Device & OS
      description: What device and OS version are you using?
      placeholder: "e.g., iPhone 15 Pro, iOS 18.1"
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Add any other context, screenshots, or screen recordings
    validations:
      required: false

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tim Heuer Apps</title>
    <meta name="description" content="A collection of apps by Tim Heuer">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 60px 20px;
        }

        header {
            text-align: center;
            margin-bottom: 60px;
        }

        header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 10px;
        }

        header p {
            font-size: 1.1rem;
            color: #a0a0b0;
        }

        .apps-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
        }

        .app-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 30px;
            text-decoration: none;
            color: inherit;
            transition: transform 0.2s ease, background 0.2s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .app-card:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.1);
        }

        .app-icon {
            width: 100px;
            height: 100px;
            border-radius: 22px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .app-card h2 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .app-card p {
            font-size: 0.95rem;
            color: #b0b0c0;
            line-height: 1.5;
        }

        footer {
            text-align: center;
            margin-top: 80px;
            color: #606070;
            font-size: 0.9rem;
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <h1>Apps</h1>
            <p>A collection of apps by Tim Heuer</p>
        </header>

        <div class="apps-grid">
            <a href="zilch/" class="app-card">
                <img src="zilch/icon.png" alt="Zilch App Icon" class="app-icon">
                <h2>Zilch</h2>
                <p>A strategic card game where the goal is simple: score the lowest. Flip, swap, and reveal your way to
                    victory against the bot.</p>
            </a>
        </div>

        <footer>
            <p>&copy; 2026 Tim Heuer. All rights reserved.</p>
        </footer>
    </div>
</body>

</html>
